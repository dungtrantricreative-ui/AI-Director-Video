# =============================================================================
# config.toml — AI Director Video Commentary (Enhanced Version)
# All configuration from this file. No .env needed.
# =============================================================================

[api]
# Cerebras API for script writing (Gemma 4 31B)
cerebras_api_key = "csk-vdmwee9e6kpmpyxdcfkvrxrcyhekh5w6vk39nwfc9wxmpkhk"
cerebras_base_url = "https://api.cerebras.ai/v1"
cerebras_model = "zai-glm-4.7"
cerebras_max_tokens = 8000
cerebras_temperature = 0.8

# Hugging Face token (for Qwen3-VL-4B-Instruct or other models)
hf_token = "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"

# Mistral API for vision analysis
mistral_api_key = "WJkOtf6FxncjGsfLs2mujxew0ikNIDKX"
mistral_base_url = "https://api.mistral.ai/v1"

[tts]
# edge-tts: no API key needed, just select voice
engine = "edge-tts"
# Vietnamese: "vi-VN-HoangMinhNeural", "vi-VN-NamMinhNeural"
# English: "en-US-JennyNeural", "en-US-GuyNeural"
voice = "vi-VN-HoangMinhNeural"
rate = "+0%"
volume = "+0%"
pitch = "+0Hz"

[processing]
# ---- ASR (faster-whisper) ----
asr_model_size = "small"          # tiny/base/small/medium/large-v3
asr_device = "auto"               # auto | cuda | cpu
asr_compute_type = "auto"         # auto | float16 | int8
asr_language = "vi"               # language code, leave empty "" for auto-detect

# ---- Vision ----
# "local" (needs GPU) | "cerebras" | "mistral" (recommended for no-GPU machines)
vision_backend = "local"
cerebras_vision_model = "gemma-4-31b"
cerebras_vision_max_images = 2
cerebras_vision_rpm = 5

# ---- Vision backend "mistral" ----
mistral_vision_model = "mistral-large-latest"
mistral_vision_max_images = 8
mistral_vision_rpm = 15

vision_model_name = "Qwen/Qwen3-VL-4B-Instruct"
vision_device = "auto"
vision_dtype = "float16"
vision_max_new_tokens = 512
vision_attn_implementation = "sdpa"
vision_batch_size = 4
vision_frames_per_scene = 3

# ---- Scene detection ----
scene_threshold = 27.0
min_scene_len_sec = 1.0

# ---- Narration / storyboard ----
narration_pov = "third_person"    # third_person | first_person
content_type = "movie"            # movie | tv_drama | anime | short_drama | foreign_language_commentary
genre = "drama"
target_duration_sec = 180
chars_per_sec = 4.0                # CJK characters per second
words_per_sec = 2.5                 # Vietnamese/English words per second
buffer_after_speech = 0.1
min_clip_duration = 1.0
max_speed_ratio = 4.0

# ---- Checkpoint frequency ----
# micro_checkpoint_interval: save checkpoint every N items (scenes/batches)
# Lower = more frequent (near real-time). Default: 1 = every item.
micro_checkpoint_interval = 1
# auto_sync_cloud: auto sync to Filebase after each checkpoint
auto_sync_cloud = true

[paths]
input_video = "./input/source.mp4"
output_dir = "./output"
checkpoint_dir = "./checkpoints"
model_cache_dir = "./model_cache"
# projects_dir: where all projects are stored
projects_dir = "./projects"

[filebase]
# Đã chuyển từ Filebase sang Tigris (https://www.tigrisdata.com) — mục vẫn
# tên "[filebase]" vì code (filebase_storage.py) dùng chung logic cho mọi
# provider tương thích S3, chỉ đổi giá trị bên dưới là đủ.
# Access key (Tigris)
access_key = "tid_cedowsuKxoNrEXDkqMUbbWzzLrESkAoMtYsigaRjwAuEQ_jKka"
# Secret key (Tigris)
secret_key = "tsec_HjiP2ZS_c1f+-EmBbXB0dQ3ZjLEqadFJXHiS42OcpSxqG_H5t-57BzJxeJOU9MPGjW5IHi"
# Bucket name
bucket_name = "ai-director-video-ngoc-quynh"
# Tigris S3 endpoint (dùng ngoài mạng Fly.io; nếu chạy trên Fly.io có thể
# đổi sang "https://fly.storage.tigris.dev" để giảm độ trễ)
endpoint_url = "https://t3.storage.dev"
# Tigris dùng region "auto" (không phải vùng AWS cụ thể như Filebase)
region_name = "auto"
# Tigris BẮT BUỘC dùng virtual-hosted style (bucket nằm trong hostname),
# khác với Filebase dùng "path". Đặt sai sẽ gây lỗi 403/404 khó hiểu.
addressing_style = "virtual"
# Enable/disable cloud sync
enabled = true

[project]
# Default project settings
auto_project_scan = true
show_project_menu_on_start = true
# Auto-save interval in seconds (0 = after each stage)
auto_save_interval = 0
# Max cloud sync retry attempts
cloud_sync_retries = 3
